<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AppCrane - AppStudio</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/docs/shared.css">
<style>
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:10px 20px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;font-size:.9rem;font-weight:500}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Request table */
.filter-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.filter-row select,.filter-row input{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:6px 10px;font-size:13px}
.filter-row input{flex:1;min-width:160px}
.req-count{font-size:.8rem;color:var(--dim);margin-left:auto}
.req-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.req-table th{text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);font-weight:600;padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
.req-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top;font-size:.875rem}
.req-table tbody tr:last-child td{border-bottom:none}
.req-table tbody tr{background:var(--surface);transition:background .12s}
.req-table tbody tr.clickable{cursor:pointer}
.req-table tbody tr.clickable:hover{background:var(--surface2)}
.req-table tbody tr.s-new td:first-child{border-left:3px solid var(--accent)}
.req-table tbody tr.s-selected td:first-child,.req-table tbody tr.s-planning td:first-child{border-left:3px solid #8b5cf6}
.req-table tbody tr.s-pending_user_review_plan td:first-child,.req-table tbody tr.s-plan_approved td:first-child,.req-table tbody tr.s-coding td:first-child{border-left:3px solid #06b6d4}
.req-table tbody tr.s-sandbox_ready td:first-child,.req-table tbody tr.s-merged td:first-child,.req-table tbody tr.s-done td:first-child{border-left:3px solid #22c55e}
.req-table tbody tr.s-auto_failed td:first-child{border-left:3px solid var(--red)}
.req-table tbody tr.s-no_changes_needed td:first-child{border-left:3px solid var(--dim)}
.app-pill{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:.75rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.enh-status{display:inline-block;border:1px solid;border-radius:5px;padding:3px 9px;font-size:.73rem;font-weight:600;white-space:nowrap}
.s-new{border-color:var(--accent)!important;color:var(--accent)!important;background:#3b82f610!important}
.s-selected,.s-planning{border-color:#8b5cf6!important;color:#8b5cf6!important;background:#8b5cf610!important}
.s-pending_user_review_plan{border-color:#f59e0b!important;color:#f59e0b!important;background:#f59e0b10!important}
.s-plan_approved,.s-coding{border-color:#06b6d4!important;color:#06b6d4!important;background:#06b6d410!important}
.s-sandbox_ready,.s-merged,.s-done{border-color:#22c55e!important;color:#22c55e!important;background:#22c55e10!important}
.s-auto_failed{border-color:var(--red)!important;color:var(--red)!important;background:#ef444410!important}
.s-no_changes_needed{border-color:var(--dim)!important;color:var(--dim)!important;background:#71717a10!important}
.s-in_progress{border-color:#f59e0b!important;color:#f59e0b!important;background:#f59e0b10!important}
.btn-start{background:var(--accent);color:#fff;border:none;border-radius:5px;padding:4px 10px;font-size:.75rem;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-start:hover{opacity:.85}
.enh-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:.9rem;padding:2px 6px;border-radius:4px;transition:color .15s}
.enh-del:hover{color:var(--red)}
.msg-cell{line-height:1.45;max-width:0}
.date-cell{white-space:nowrap;color:var(--dim);font-size:.8rem}

/* Detail */
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px}
.plan-files{list-style:none;padding:0;margin:8px 0}
.plan-files li{padding:4px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.plan-files li:last-child{border-bottom:none}
.actions-bar{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.cost-badge{font-size:.75rem;color:var(--dim);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 8px}

/* Trace panel */
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
.trace-panel{margin-top:20px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.trace-heading{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);padding:8px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.trace-pulse{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse-dot 1.4s ease-in-out infinite}
.trace-block{border-bottom:1px solid var(--border)}
.trace-block:last-child{border-bottom:none}
.trace-block-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;background:var(--surface);user-select:none}
.trace-block-hdr:hover{background:var(--surface2)}
.trace-phase{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;min-width:70px}
.trace-timing{font-size:.72rem;color:var(--dim);font-family:monospace;margin-left:auto}
.trace-err{font-size:.72rem;color:var(--red);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trace-body{background:var(--bg);padding:10px 14px;font-family:'SF Mono',Monaco,monospace;font-size:.73rem;color:var(--dim);white-space:pre-wrap;word-break:break-word;line-height:1.6;max-height:500px;overflow-y:auto;border-top:1px solid var(--border)}
.trace-time-row{display:flex;align-items:center;gap:6px;padding:5px 14px;background:var(--surface2);border-top:1px solid var(--border);font-size:.7rem;color:var(--dim);font-family:monospace;flex-wrap:wrap}
.ttr-seg{display:flex;align-items:center;gap:4px}
.ttr-label{color:var(--dim);opacity:.7;font-size:.65rem;text-transform:uppercase;letter-spacing:.3px}
.ttr-val{color:var(--text)}
.ttr-dur{color:var(--accent);font-weight:600}
.ttr-arrow{opacity:.4;font-size:.65rem}
.ttr-wait{color:var(--yellow)}
.trace-ai-log{padding:10px 14px;font-size:.78rem;color:var(--dim);background:var(--surface);white-space:pre-wrap;border-top:1px solid var(--border);line-height:1.5}
.ti-queued{color:var(--dim)}.ti-running{color:var(--accent)}.ti-done{color:var(--green)}.ti-failed{color:var(--red)}

/* Library / Jobs / Usage */
.context-editor{width:100%;min-height:200px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;color:var(--text);font-family:monospace;font-size:.82rem;resize:vertical}
.job-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.job-row:last-child{border-bottom:none}
.job-tag{font-family:monospace;font-size:.72rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 6px;cursor:pointer;color:var(--dim);white-space:nowrap;flex-shrink:0}
.job-tag:hover{border-color:var(--accent);color:var(--accent)}
.enh-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;cursor:default}
.enh-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.enh-meta{font-size:.75rem;color:var(--dim);display:flex;gap:12px;flex-wrap:wrap}
.usage-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px}
/* Chat planning panel (Feature 17) */
.chat-overlay{position:fixed;inset:0;background:#00000080;z-index:200;display:flex;align-items:center;justify-content:center}
.chat-modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:min(560px,95vw);max-height:80vh;display:flex;flex-direction:column;padding:0;overflow:hidden}
.chat-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-messages{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:10px;min-height:200px}
.chat-bubble{border-radius:8px;padding:9px 13px;font-size:.85rem;line-height:1.5;max-width:88%}
.chat-bubble.user{background:var(--accent);color:#fff;align-self:flex-end}
.chat-bubble.ai{background:var(--surface2);color:var(--text);align-self:flex-start;border:1px solid var(--border)}
.chat-input-row{display:flex;gap:8px;padding:10px 18px;border-top:1px solid var(--border);flex-shrink:0}
.chat-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:.85rem;resize:none;font-family:inherit;min-height:38px}
.chat-footer{display:flex;gap:8px;padding:10px 18px;border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
</style>
</head>
<body>
<script src="/docs/shared.js"></script>
<script>
if (!checkAuth()) throw 'auth';
document.body.insertAdjacentHTML('beforeend',
  '<div class="page-body">' + sidebar('appstudio') +
  '<div class="page-content"><div class="container">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">' +
      '<h2 style="margin:0">AppStudio</h2>' +
      '<span style="color:var(--dim);font-size:.8rem">AI-powered enhancement pipeline</span>' +
    '</div>' +
    '<div class="tabs">' +
      '<div class="tab active" data-tab="requests">Requests</div>' +
      '<div class="tab" data-tab="library">Library</div>' +
      '<div class="tab" data-tab="usage">Usage</div>' +
    '</div>' +
    '<div id="tabContent"></div>' +
  '</div></div></div>');
loadVersion(); loadUserInfo();

let activeTab = 'requests';
let allEnhancements = [];
let allApps = [];

document.querySelectorAll('.tab').forEach(function(t) {
  t.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
    t.classList.add('active');
    activeTab = t.dataset.tab;
    renderTab();
  });
});

async function loadData() {
  const [enhData, appData] = await Promise.all([
    apiFetch('/api/enhancements'),
    apiFetch('/api/apps'),
  ]);
  allEnhancements = (enhData.requests || []).sort(function(a, b) { return b.id - a.id; });
  allApps = appData.apps || [];
  renderTab();
}

function renderTab() {
  var el = document.getElementById('tabContent');
  el.textContent = '';
  switch (activeTab) {
    case 'requests': renderRequests(el); break;
    case 'library': renderLibrary(el); break;
    case 'usage': renderUsage(el); break;
  }
}

var STATUS_LABELS = {
  new: 'New', selected: 'Selected for Implementation', planning: 'Planning…',
  no_changes_needed: 'No changes needed',
  pending_user_review_plan: 'Plan ready', plan_approved: 'Approved',
  coding: 'Coding…', sandbox_ready: 'Sandbox ready',
  merged: 'Shipped', done: 'Done', auto_failed: 'Failed', in_progress: 'In Progress',
};

function statusLabel(s) { return STATUS_LABELS[s] || s; }

function fmtDate(str) {
  if (!str) return '';
  var d = new Date(str.replace(' ', 'T') + (str.includes('T') ? '' : 'Z'));
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}

function fmtJobTime(str) {
  if (!str) return null;
  var d = new Date(str.replace(' ', 'T') + (str.includes('T') ? '' : 'Z'));
  return d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function fmtMs(ms) {
  if (ms == null || ms < 0) return null;
  if (ms < 1000) return '<1s';
  if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
  var m = Math.floor(ms / 60000), s = Math.floor((ms % 60000) / 1000);
  return m + 'm ' + s + 's';
}

function msGap(a, b) {
  if (!a || !b) return null;
  var ta = new Date(a.replace(' ', 'T') + (a.includes('T') ? '' : 'Z')).getTime();
  var tb = new Date(b.replace(' ', 'T') + (b.includes('T') ? '' : 'Z')).getTime();
  return tb - ta;
}

async function delRequest(id) {
  if (!confirm('Delete this enhancement request?')) return;
  var result = await apiPost('/api/enhancements/' + id + '/delete', {});
  if (result && result.error) { alert('Delete failed: ' + (result.error.message || JSON.stringify(result.error))); return; }
  allEnhancements = allEnhancements.filter(function(r) { return r.id !== id; });
  renderTab();
}

async function startDeveloping(id) {
  var result = await apiPost('/api/enhancements/' + id + '/set-status', { status: 'selected' });
  if (result && result.error) { alert('Failed: ' + (result.error.message || JSON.stringify(result.error))); return; }
  var idx = allEnhancements.findIndex(function(r) { return r.id === id; });
  if (idx !== -1) allEnhancements[idx].status = 'selected';
  renderTab();
}

var JOB_STATUS_COLOR = { queued: 'var(--dim)', running: '#f59e0b', done: 'var(--green)', failed: 'var(--red)' };

function renderRequests(el) {
  var filterDiv = document.createElement('div');
  filterDiv.className = 'filter-row';

  var appSel = document.createElement('select');
  var allAppOpt = document.createElement('option'); allAppOpt.value = ''; allAppOpt.textContent = 'All apps'; appSel.appendChild(allAppOpt);
  var slugSet = new Set(allEnhancements.map(function(r) { return r.app_slug; }).filter(Boolean));
  allApps.forEach(function(a) { slugSet.add(a.slug); });
  Array.from(slugSet).sort().forEach(function(s) { var o = document.createElement('option'); o.value = s; o.textContent = s; appSel.appendChild(o); });

  var statusSel = document.createElement('select');
  [['', 'All statuses'], ['new', 'New'], ['selected', 'Selected'],
   ['planning', 'Planning'], ['pending_user_review_plan', 'Plan ready'],
   ['plan_approved', 'Approved'], ['coding', 'Coding'], ['pushing', 'Pushing'],
   ['building', 'Building'], ['sandbox_ready', 'Sandbox ready'],
   ['merged', 'Shipped'], ['done', 'Done'], ['auto_failed', 'Failed'], ['no_changes_needed', 'No changes needed']
  ].forEach(function(pair) { var o = document.createElement('option'); o.value = pair[0]; o.textContent = pair[1]; statusSel.appendChild(o); });

  var searchInput = document.createElement('input');
  searchInput.placeholder = 'Search message, user, app…';

  var countEl = document.createElement('span'); countEl.className = 'req-count';

  var newBtn = document.createElement('button');
  newBtn.className = 'btn btn-accent'; newBtn.style.cssText = 'font-size:.8rem;white-space:nowrap;padding:5px 12px;margin-left:auto';
  newBtn.textContent = '+ New Request';
  newBtn.addEventListener('click', openChatPlanner);

  filterDiv.appendChild(appSel); filterDiv.appendChild(statusSel);
  filterDiv.appendChild(searchInput); filterDiv.appendChild(countEl); filterDiv.appendChild(newBtn);
  el.appendChild(filterDiv);

  var wrap = document.createElement('div');
  var table = document.createElement('table'); table.className = 'req-table';
  var thead = table.createTHead(); var hrow = thead.insertRow();
  ['#', 'App', 'User', 'Date', 'Message', 'Status', 'Latest Job', 'Cost', 'Branch / PR', ''].forEach(function(h) {
    var th = document.createElement('th'); th.textContent = h; hrow.appendChild(th);
  });
  var tbody = table.createTBody();
  wrap.appendChild(table); el.appendChild(wrap);

  function doRender() {
    var appF = appSel.value, statusF = statusSel.value, q = searchInput.value.trim().toLowerCase();
    var rows = allEnhancements.filter(function(r) {
      if (appF && r.app_slug !== appF) return false;
      if (statusF && (r.status || 'new') !== statusF) return false;
      if (q && !(r.message || '').toLowerCase().includes(q) && !(r.user_name || '').toLowerCase().includes(q) && !(r.app_slug || '').toLowerCase().includes(q)) return false;
      return true;
    });
    countEl.textContent = rows.length + ' request' + (rows.length !== 1 ? 's' : '');
    tbody.textContent = '';
    if (!rows.length) {
      var empty = document.createElement('tr'); var etd = document.createElement('td');
      etd.colSpan = 10; etd.style.cssText = 'text-align:center;padding:32px;color:var(--dim)';
      etd.textContent = 'No enhancement requests' + (appF || statusF || q ? ' matching filters' : '');
      empty.appendChild(etd); tbody.appendChild(empty); return;
    }
    rows.forEach(function(r) {
      var status = r.status || 'new';
      var isNew = status === 'new';
      var tr = document.createElement('tr');
      tr.className = 's-' + status + ' clickable';
      tr.addEventListener('click', function() { showDetail(r.id); });

      // ID
      var tdId = tr.insertCell(); tdId.style.cssText = 'font-family:monospace;font-size:.72rem;color:var(--dim);white-space:nowrap';
      tdId.textContent = '#' + String(r.id).padStart(4, '0');

      // App
      var tdApp = tr.insertCell();
      if (r.app_slug) { var pill = document.createElement('span'); pill.className = 'app-pill'; pill.textContent = r.app_slug; pill.title = r.app_slug; tdApp.appendChild(pill); }
      else { tdApp.style.color = 'var(--dim)'; tdApp.textContent = '—'; }

      // User
      var tdUser = tr.insertCell(); tdUser.style.cssText = 'font-size:.82rem'; tdUser.textContent = r.user_name || '—';

      // Date
      var tdDate = tr.insertCell(); tdDate.className = 'date-cell'; tdDate.textContent = fmtDate(r.created_at);

      // Message
      var tdMsg = tr.insertCell(); tdMsg.className = 'msg-cell'; tdMsg.textContent = r.message;

      // Enhancement status badge
      var tdStatus = tr.insertCell();
      var badge = document.createElement('span'); badge.className = 'enh-status s-' + status; badge.textContent = statusLabel(status); tdStatus.appendChild(badge);
      if (isNew) {
        var startBtn = document.createElement('button'); startBtn.className = 'btn-start'; startBtn.style.cssText = 'margin-top:4px;display:block';
        startBtn.textContent = 'Start';
        startBtn.addEventListener('click', function(ev) { ev.stopPropagation(); startDeveloping(r.id); });
        tdStatus.appendChild(startBtn);
      }

      // Latest job
      var tdJob = tr.insertCell(); tdJob.style.cssText = 'white-space:nowrap;font-size:.78rem';
      if (r.latest_job_id) {
        var jobTag = document.createElement('span'); jobTag.className = 'job-tag';
        jobTag.textContent = 'JOB-' + String(r.latest_job_id).padStart(4, '0');
        jobTag.title = 'Click to copy'; jobTag.style.marginRight = '4px';
        jobTag.addEventListener('click', function(jid) { return function(ev) { ev.stopPropagation(); navigator.clipboard.writeText('JOB-' + String(jid).padStart(4,'0')); }; }(r.latest_job_id));
        tdJob.appendChild(jobTag);
        var phaseSpan = document.createElement('span'); phaseSpan.style.cssText = 'font-size:.7rem;margin-right:4px'; phaseSpan.textContent = r.latest_job_phase || '';
        tdJob.appendChild(phaseSpan);
        var jstSpan = document.createElement('span');
        jstSpan.style.cssText = 'font-size:.7rem;font-weight:700;color:' + (JOB_STATUS_COLOR[r.latest_job_status] || 'var(--dim)');
        jstSpan.textContent = r.latest_job_status || '';
        tdJob.appendChild(jstSpan);
        if (r.latest_job_error) {
          var errSpan = document.createElement('div'); errSpan.style.cssText = 'font-size:.68rem;color:var(--red);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
          errSpan.title = r.latest_job_error; errSpan.textContent = r.latest_job_error;
          tdJob.appendChild(errSpan);
        }
      } else {
        tdJob.style.color = 'var(--dim)'; tdJob.textContent = '—';
      }

      // Cost
      var tdCost = tr.insertCell(); tdCost.style.cssText = 'font-size:.75rem;white-space:nowrap';
      var totalTokens = (r.cost_tokens || 0);
      var totalCents = (r.cost_usd_cents || 0);
      if (totalTokens > 0) {
        var tokDiv = document.createElement('div'); tokDiv.style.color = 'var(--dim)'; tokDiv.textContent = totalTokens.toLocaleString() + ' tok';
        tdCost.appendChild(tokDiv);
      }
      if (totalCents > 0) {
        var costDiv = document.createElement('div'); costDiv.style.fontWeight = '600';
        costDiv.textContent = '$' + (totalCents / 100).toFixed(3);
        tdCost.appendChild(costDiv);
      }
      if (!totalTokens && !totalCents) { tdCost.style.color = 'var(--dim)'; tdCost.textContent = '—'; }

      // Branch / PR
      var tdBranch = tr.insertCell(); tdBranch.style.cssText = 'font-size:.72rem;font-family:monospace;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis';
      if (r.pr_url) {
        var prLink = document.createElement('a'); prLink.href = r.pr_url; prLink.target = '_blank';
        prLink.style.cssText = 'color:var(--accent);text-decoration:none'; prLink.textContent = 'PR ↗';
        prLink.addEventListener('click', function(ev) { ev.stopPropagation(); });
        tdBranch.appendChild(prLink);
      } else if (r.branch_name || r.fix_version) {
        tdBranch.style.color = 'var(--dim)'; tdBranch.title = r.branch_name || r.fix_version;
        tdBranch.textContent = (r.branch_name || r.fix_version || '').replace('appstudio/', '');
      } else {
        tdBranch.style.color = 'var(--dim)'; tdBranch.textContent = '—';
      }

      // Delete
      var tdDel = tr.insertCell(); tdDel.style.textAlign = 'center';
      var del = document.createElement('button'); del.className = 'enh-del'; del.title = 'Delete'; del.textContent = '✕';
      del.addEventListener('click', function(ev) { ev.stopPropagation(); delRequest(r.id); });
      tdDel.appendChild(del);

      tbody.appendChild(tr);
    });
  }

  appSel.addEventListener('change', doRender);
  statusSel.addEventListener('change', doRender);
  searchInput.addEventListener('input', doRender);
  doRender();
}

async function showDetail(id) {
  var el = document.getElementById('tabContent');
  el.textContent = 'Loading...';
  var data = await apiFetch('/api/appstudio/' + id);
  var e = data.enhancement;
  var jobs = data.jobs || [];

  el.textContent = '';
  var panel = document.createElement('div');
  panel.className = 'detail-panel';

  var back = document.createElement('button');
  back.className = 'btn'; back.style.cssText = 'font-size:.8rem;margin-bottom:12px';
  back.textContent = 'Back to list';
  back.addEventListener('click', function() { renderTab(); });
  panel.appendChild(back);

  var title = document.createElement('h3');
  title.style.margin = '0 0 4px';
  title.textContent = e.message.slice(0, 100);
  panel.appendChild(title);

  var metaDiv = document.createElement('div');
  metaDiv.style.cssText = 'font-size:.8rem;color:var(--dim);margin-bottom:12px';
  metaDiv.textContent = [e.app_slug, e.user_name, (e.created_at || '').slice(0, 16)].filter(Boolean).join(' · ');
  var statusBadge = document.createElement('span');
  statusBadge.className = 'enh-status s-' + (e.status || 'new');
  statusBadge.style.marginLeft = '8px';
  statusBadge.textContent = statusLabel(e.status);
  metaDiv.appendChild(statusBadge);
  panel.appendChild(metaDiv);

  var msgBox = document.createElement('div');
  msgBox.style.cssText = 'margin-bottom:16px;line-height:1.5';
  msgBox.textContent = e.message;
  panel.appendChild(msgBox);

  // Trace panel
  var tracePanel = document.createElement('div'); tracePanel.className = 'trace-panel'; tracePanel.id = 'tracePanel';
  panel.appendChild(tracePanel);

  var _tracePoll = null;
  function renderTrace(t) {
    tracePanel.textContent = '';
    var hdr = document.createElement('div'); hdr.className = 'trace-heading';
    if (t.active) { var dp = document.createElement('span'); dp.className = 'trace-pulse'; hdr.appendChild(dp); }
    hdr.appendChild(document.createTextNode(t.active ? 'Live trace — job running' : 'Trace — ' + t.trace.length + ' job' + (t.trace.length !== 1 ? 's' : '')));
    tracePanel.appendChild(hdr);

    t.trace.forEach(function(j) {
      var block = document.createElement('div'); block.className = 'trace-block';

      var bh = document.createElement('div'); bh.className = 'trace-block-hdr';
      var jtag = document.createElement('span'); jtag.className = 'job-tag';
      jtag.textContent = 'JOB-' + String(j.id).padStart(4,'0');
      jtag.title = 'Click to copy'; jtag.style.marginRight = '2px';
      jtag.addEventListener('click', function(e2) { e2.stopPropagation(); navigator.clipboard.writeText(jtag.textContent); });
      var ph = document.createElement('span'); ph.className = 'trace-phase';
      ph.textContent = j.phase;
      var st = document.createElement('span');
      st.className = 'ti-' + j.status;
      st.textContent = j.status === 'done' ? '✓' : j.status === 'failed' ? '✗' : j.status === 'running' ? '▶' : '·';
      st.style.cssText = 'font-size:.85rem;font-weight:700;width:14px;flex-shrink:0';
      var timing = document.createElement('span'); timing.className = 'trace-timing';
      if (j.duration_ms != null) {
        timing.textContent = (j.started_at ? fmtJobTime(j.started_at) + ' · ' : '') + fmtMs(j.duration_ms);
      } else if (j.started_at) {
        var elapsedMs = Date.now() - new Date(j.started_at.replace(' ','T')+'Z').getTime();
        timing.textContent = fmtJobTime(j.started_at) + ' · ' + fmtMs(elapsedMs) + ' elapsed';
      } else if (j.created_at) {
        timing.textContent = 'queued ' + fmtJobTime(j.created_at);
      }
      if (j.error) {
        var err = document.createElement('span'); err.className = 'trace-err'; err.textContent = j.error; bh.appendChild(jtag); bh.appendChild(ph); bh.appendChild(st); bh.appendChild(err); bh.appendChild(timing);
      } else { bh.appendChild(jtag); bh.appendChild(ph); bh.appendChild(st); bh.appendChild(timing); }
      if (j.cost_tokens > 0) {
        var tokBadge = document.createElement('span');
        tokBadge.style.cssText = 'font-size:.68rem;color:var(--dim);font-family:monospace;white-space:nowrap;flex-shrink:0;padding:1px 5px;background:var(--bg);border:1px solid var(--border);border-radius:3px';
        var tokStr = j.cost_tokens.toLocaleString() + '\u202ftok';
        if (j.cost_usd_cents > 0) tokStr += '\u2009·\u2009$' + (j.cost_usd_cents / 100).toFixed(3);
        tokBadge.textContent = tokStr;
        bh.appendChild(tokBadge);
      }
      if (j.status === 'failed') {
        var retBtn = document.createElement('button');
        retBtn.textContent = 'Retry'; retBtn.style.cssText = 'margin-left:8px;font-size:.7rem;padding:2px 8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;cursor:pointer;flex-shrink:0';
        retBtn.addEventListener('click', function(jid, eid) { return async function(ev) { ev.stopPropagation();
          var r = await apiPost('/api/appstudio/jobs/' + jid + '/retry', {});
          if (r && r.error) { alert(r.error.message || r.error); return; }
          fetchAndRender();
        }; }(j.id, id));
        bh.appendChild(retBtn);
      }
      if (j.status !== 'running') {
        var delBtn = document.createElement('button');
        delBtn.textContent = '✕'; delBtn.title = 'Delete job'; delBtn.style.cssText = 'margin-left:4px;font-size:.7rem;padding:2px 7px;color:var(--red);background:none;border:1px solid var(--red);border-radius:4px;cursor:pointer;flex-shrink:0';
        delBtn.addEventListener('click', function(jid, eid) { return async function(ev) { ev.stopPropagation();
          if (!confirm('Delete job JOB-' + String(jid).padStart(4,'0') + '?')) return;
          var r = await apiDelete('/api/appstudio/jobs/' + jid);
          if (r && r.error) { alert(r.error.message || r.error); return; }
          fetchAndRender();
        }; }(j.id, id));
        bh.appendChild(delBtn);
      }
      block.appendChild(bh);

      // Time info row
      var ttr = document.createElement('div'); ttr.className = 'trace-time-row';
      function ttrSeg(label, val, cls) {
        var seg = document.createElement('span'); seg.className = 'ttr-seg';
        var l = document.createElement('span'); l.className = 'ttr-label'; l.textContent = label;
        var v = document.createElement('span'); v.className = cls || 'ttr-val'; v.textContent = val;
        seg.appendChild(l); seg.appendChild(v); return seg;
      }
      if (j.created_at) ttr.appendChild(ttrSeg('queued', fmtJobTime(j.created_at)));
      if (j.started_at) {
        var arr1 = document.createElement('span'); arr1.className = 'ttr-arrow'; arr1.textContent = '→';
        ttr.appendChild(arr1);
        ttr.appendChild(ttrSeg('started', fmtJobTime(j.started_at)));
        var waitMs = msGap(j.created_at, j.started_at);
        if (waitMs != null && waitMs > 1000) {
          var wspan = document.createElement('span'); wspan.className = 'ttr-wait'; wspan.textContent = '(+' + fmtMs(waitMs) + ' wait)';
          ttr.appendChild(wspan);
        }
      }
      if (j.finished_at) {
        var arr2 = document.createElement('span'); arr2.className = 'ttr-arrow'; arr2.textContent = '→';
        ttr.appendChild(arr2);
        ttr.appendChild(ttrSeg('done', fmtJobTime(j.finished_at)));
        var durMs = j.duration_ms != null ? j.duration_ms : msGap(j.started_at, j.finished_at);
        if (durMs != null) {
          var dspan = document.createElement('span'); dspan.className = 'ttr-dur'; dspan.textContent = fmtMs(durMs);
          ttr.appendChild(dspan);
        }
      } else if (j.started_at && j.status === 'running') {
        var arr3 = document.createElement('span'); arr3.className = 'ttr-arrow'; arr3.textContent = '→';
        ttr.appendChild(arr3);
        var runEl = document.createElement('span'); runEl.className = 'ttr-dur';
        var runMs = Date.now() - new Date(j.started_at.replace(' ','T')+'Z').getTime();
        runEl.textContent = fmtMs(runMs) + ' running';
        ttr.appendChild(runEl);
      }
      block.appendChild(ttr);

      var body = document.createElement('pre'); body.className = 'trace-body'; body.id = 'trace-body-' + j.id;
      var bodyLines = [];
      if (j.text) bodyLines.push(j.text);
      if (j.log && j.log.length) bodyLines.push(j.log.join('\n'));
      if (j.branch) bodyLines.push('Branch: ' + j.branch);
      if (j.error) bodyLines.push('Error: ' + j.error);
      body.textContent = bodyLines.join('\n') || (j.status === 'queued' ? 'Queued, waiting for worker…' : j.status === 'running' ? 'Starting…' : '(no output)');

      var isOpen = j.status === 'running' || j.status === 'failed' || (j.status === 'queued');
      body.style.display = isOpen ? 'block' : 'none';
      bh.addEventListener('click', function() { body.style.display = body.style.display === 'none' ? 'block' : 'none'; });
      block.appendChild(body);
      tracePanel.appendChild(block);

      if (j.status === 'running') { body.scrollTop = body.scrollHeight; }
    });

    if (t.ai_log && t.ai_log.trim()) {
      var logDiv = document.createElement('div'); logDiv.className = 'trace-ai-log';
      logDiv.textContent = t.ai_log.trim();
      tracePanel.appendChild(logDiv);
    }
  }

  async function fetchAndRender() {
    var t = await apiFetch('/api/appstudio/' + id + '/trace');
    renderTrace(t);
    if (!t.active && _tracePoll) { clearInterval(_tracePoll); _tracePoll = null; }
  }

  fetchAndRender();
  _tracePoll = setInterval(fetchAndRender, 1500);
  back.addEventListener('click', function() { if (_tracePoll) { clearInterval(_tracePoll); _tracePoll = null; } });

  if (e.ai_plan) {
    var planHeading = document.createElement('h4');
    planHeading.textContent = 'AI Plan';
    planHeading.style.margin = '16px 0 8px';
    panel.appendChild(planHeading);

    if (e.ai_plan.summary) {
      var summary = document.createElement('div');
      summary.style.cssText = 'margin-bottom:8px;font-size:.9rem';
      summary.textContent = e.ai_plan.summary;
      panel.appendChild(summary);
    }

    if (e.ai_plan.files_to_change) {
      var fileList = document.createElement('ul');
      fileList.className = 'plan-files';
      for (var fi = 0; fi < e.ai_plan.files_to_change.length; fi++) {
        var f = e.ai_plan.files_to_change[fi];
        var li = document.createElement('li');
        var code = document.createElement('code'); code.textContent = f.path; li.appendChild(code);
        var action = document.createElement('span');
        action.style.cssText = 'margin-left:8px;color:var(--dim)';
        action.textContent = '(' + f.action + ', ~' + f.estimated_loc + ' LOC) ' + (f.rationale || '');
        li.appendChild(action);
        fileList.appendChild(li);
      }
      panel.appendChild(fileList);
    }

    if (e.ai_plan.test_files && e.ai_plan.test_files.length) {
      var testHeading = document.createElement('div');
      testHeading.style.cssText = 'font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--green);margin:12px 0 4px';
      testHeading.textContent = 'Tests (' + e.ai_plan.test_files.length + ')';
      panel.appendChild(testHeading);
      var testList = document.createElement('ul');
      testList.className = 'plan-files';
      testList.style.borderColor = '#22c55e33';
      for (var ti = 0; ti < e.ai_plan.test_files.length; ti++) {
        var tf = e.ai_plan.test_files[ti];
        var tli = document.createElement('li');
        var tcode = document.createElement('code');
        tcode.style.color = 'var(--green)';
        tcode.textContent = tf.path;
        tli.appendChild(tcode);
        var tact = document.createElement('span');
        tact.style.cssText = 'margin-left:8px;color:var(--dim)';
        tact.textContent = '(' + tf.action + ') ' + (tf.what || '');
        tli.appendChild(tact);
        testList.appendChild(tli);
      }
      panel.appendChild(testList);
    }

    if (e.ai_plan.risks && e.ai_plan.risks.length) {
      var risksDiv = document.createElement('div');
      risksDiv.style.cssText = 'margin:8px 0;padding:8px 12px;background:#ef444412;border:1px solid #ef444433;border-radius:6px;font-size:.82rem';
      risksDiv.textContent = 'Risks: ' + e.ai_plan.risks.join('; ');
      panel.appendChild(risksDiv);
    }

    if (e.ai_plan.test_plan) {
      var testDiv = document.createElement('div');
      testDiv.style.cssText = 'margin:8px 0;font-size:.82rem;color:var(--dim)';
      testDiv.textContent = 'Test plan: ' + e.ai_plan.test_plan;
      panel.appendChild(testDiv);
    }
  }

  if (e.cost_usd_cents > 0) {
    var cost = document.createElement('div');
    cost.className = 'cost-badge'; cost.style.margin = '12px 0';
    cost.textContent = 'Total cost: $' + (e.cost_usd_cents / 100).toFixed(2) + ' (' + (e.cost_tokens || 0).toLocaleString() + ' tokens)';
    panel.appendChild(cost);
  }

  if (e.pr_url) {
    var prLink = document.createElement('a');
    prLink.href = e.pr_url; prLink.target = '_blank'; prLink.className = 'btn';
    prLink.style.cssText = 'display:inline-block;margin:8px 0';
    prLink.textContent = 'View Pull Request';
    panel.appendChild(prLink);
  }

  var actions = document.createElement('div');
  actions.className = 'actions-bar';

  if (e.status === 'new' || e.status === 'selected') {
    var planBtn = document.createElement('button');
    planBtn.className = 'btn btn-accent'; planBtn.textContent = 'Plan with AI';
    planBtn.dataset.id = e.id;
    planBtn.addEventListener('click', async function() {
      var btn = this;
      btn.disabled = true; btn.textContent = 'Queuing...';
      var result = await apiPost('/api/appstudio/' + btn.dataset.id + '/plan');
      if (result && result.error) {
        alert('Failed: ' + (result.error.message || JSON.stringify(result.error)));
        btn.disabled = false; btn.textContent = 'Plan with AI';
        return;
      }
      showDetail(parseInt(btn.dataset.id));
    });
    actions.appendChild(planBtn);
  }

  if (e.status === 'pending_user_review_plan') {
    var approveBtn = document.createElement('button');
    approveBtn.className = 'btn btn-accent'; approveBtn.textContent = 'Approve plan + code it';
    approveBtn.dataset.id = e.id;
    approveBtn.addEventListener('click', async function() {
      var btn = this; btn.disabled = true;
      var result = await apiPost('/api/appstudio/' + btn.dataset.id + '/approve-plan');
      if (result && result.error) { alert('Failed: ' + (result.error.message || JSON.stringify(result.error))); btn.disabled = false; return; }
      showDetail(parseInt(btn.dataset.id));
    });
    actions.appendChild(approveBtn);

    var feedbackBtn = document.createElement('button');
    feedbackBtn.className = 'btn'; feedbackBtn.textContent = 'Request changes';
    feedbackBtn.dataset.id = e.id;
    feedbackBtn.addEventListener('click', async function() {
      var comment = prompt('What should change in the plan?');
      if (!comment) return;
      var result = await apiPost('/api/appstudio/' + this.dataset.id + '/plan-feedback', { comment: comment });
      if (result && result.error) { alert('Failed: ' + (result.error.message || JSON.stringify(result.error))); return; }
      showDetail(parseInt(this.dataset.id));
    });
    actions.appendChild(feedbackBtn);
  }

  if (e.status === 'sandbox_ready') {
    var shipBtn = document.createElement('button');
    shipBtn.className = 'btn btn-accent'; shipBtn.textContent = 'Ship it (open PR + promote)';
    shipBtn.dataset.id = e.id;
    shipBtn.addEventListener('click', async function() {
      var btn = this; btn.disabled = true;
      var result = await apiPost('/api/appstudio/' + btn.dataset.id + '/approve-sandbox');
      if (result && result.error) { alert('Failed: ' + (result.error.message || JSON.stringify(result.error))); btn.disabled = false; return; }
      showDetail(parseInt(btn.dataset.id));
    });
    actions.appendChild(shipBtn);
  }

  if (['done', 'merged', 'auto_failed'].indexOf(e.status) === -1) {
    var rejectBtn = document.createElement('button');
    rejectBtn.className = 'btn btn-red'; rejectBtn.textContent = 'Reject';
    rejectBtn.dataset.id = e.id;
    rejectBtn.addEventListener('click', async function() {
      if (!confirm('Reject this enhancement?')) return;
      await apiPost('/api/appstudio/' + this.dataset.id + '/reject');
      showDetail(parseInt(this.dataset.id));
    });
    actions.appendChild(rejectBtn);
  }

  panel.appendChild(actions);

  el.appendChild(panel);
}


async function renderLibrary(el) {
  el.textContent = '';
  if (!allApps.length) { var dim = document.createElement('div'); dim.style.color = 'var(--dim)'; dim.textContent = 'No apps.'; el.appendChild(dim); return; }
  var heading = document.createElement('p');
  heading.style.cssText = 'color:var(--dim);font-size:.85rem;margin-bottom:12px';
  heading.textContent = 'Per-app context notes for the AI agent. Saved as agent-context.md.';
  el.appendChild(heading);
  for (var i = 0; i < allApps.length; i++) {
    var app = allApps[i];
    var card = document.createElement('div');
    card.className = 'detail-panel'; card.style.marginBottom = '12px';
    var t = document.createElement('h4'); t.style.margin = '0 0 8px';
    t.textContent = app.name + ' (' + app.slug + ')';
    card.appendChild(t);
    var ta = document.createElement('textarea');
    ta.className = 'context-editor';
    ta.placeholder = 'Agent context notes for ' + app.slug + '...';
    ta.dataset.slug = app.slug;
    card.appendChild(ta);
    var saveBtn = document.createElement('button');
    saveBtn.className = 'btn'; saveBtn.style.cssText = 'margin-top:8px;font-size:.8rem';
    saveBtn.textContent = 'Save'; saveBtn.dataset.slug = app.slug;
    saveBtn.addEventListener('click', async function() {
      var slug = this.dataset.slug;
      var textarea = document.querySelector('textarea[data-slug="' + slug + '"]');
      this.disabled = true; this.textContent = 'Saving...';
      var btn = this;
      await apiPut('/api/appstudio/context/' + slug, { content: textarea.value });
      btn.textContent = 'Saved'; setTimeout(function() { btn.textContent = 'Save'; btn.disabled = false; }, 1500);
    });
    card.appendChild(saveBtn);
    el.appendChild(card);
    (function(slug, textarea) {
      apiFetch('/api/appstudio/context/' + slug).then(function(d) { textarea.value = d.content || ''; });
    })(app.slug, ta);
  }
}

async function renderUsage(el) {
  el.textContent = 'Loading...';
  var data = await apiFetch('/api/appstudio/usage/summary');
  el.textContent = '';
  var panel = document.createElement('div'); panel.className = 'detail-panel';
  var h = document.createElement('h4'); h.style.margin = '0 0 12px'; h.textContent = 'Usage — ' + data.month;
  panel.appendChild(h);
  var grid = document.createElement('div'); grid.className = 'usage-grid';
  var items = [
    { label: 'Total jobs', value: data.total_jobs || 0 },
    { label: 'Succeeded', value: data.succeeded || 0, color: 'var(--green)' },
    { label: 'Failed', value: data.failed || 0, color: 'var(--red)' },
    { label: 'Total tokens', value: (data.total_tokens || 0).toLocaleString() },
    { label: 'Total cost', value: '$' + (data.total_usd || '0.00') },
  ];
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var stat = document.createElement('div'); stat.className = 'stat';
    var lbl = document.createElement('div'); lbl.className = 'label'; lbl.textContent = it.label;
    var val = document.createElement('div'); val.className = 'value'; val.textContent = it.value;
    if (it.color) val.style.color = it.color;
    stat.appendChild(lbl); stat.appendChild(val);
    grid.appendChild(stat);
  }
  panel.appendChild(grid);
  el.appendChild(panel);
}

loadData();

// ── Chat-mode planning (Feature 17) ──────────────────────────
var _chatMessages = [];
var _chatAppSlug = '';

function openChatPlanner() {
  _chatMessages = [];
  _chatAppSlug = allApps.length === 1 ? allApps[0].slug : '';
  var modal = document.getElementById('chatPlanModal');
  var appSel = document.getElementById('chatAppSel');
  appSel.textContent = '';
  var blank = document.createElement('option'); blank.value = ''; blank.textContent = 'Select app…'; appSel.appendChild(blank);
  allApps.forEach(function(a) { var o = document.createElement('option'); o.value = a.slug; o.textContent = a.name + ' (' + a.slug + ')'; appSel.appendChild(o); });
  if (_chatAppSlug) appSel.value = _chatAppSlug;
  document.getElementById('chatMessages').textContent = '';
  appendChatBubble('ai', 'What would you like to add or improve? Describe it briefly and I\'ll help you refine it.');
  document.getElementById('chatInput').value = '';
  modal.style.display = 'flex';
  document.getElementById('chatInput').focus();
}

function closeChatPlanner() {
  document.getElementById('chatPlanModal').style.display = 'none';
}

function appendChatBubble(role, text) {
  var el = document.getElementById('chatMessages');
  var div = document.createElement('div');
  div.className = 'chat-bubble ' + role;
  div.textContent = text;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

async function sendChatMessage() {
  var input = document.getElementById('chatInput');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  _chatAppSlug = document.getElementById('chatAppSel').value;
  _chatMessages.push({ role: 'user', content: text });
  appendChatBubble('user', text);
  var sendBtn = document.getElementById('chatSendBtn');
  sendBtn.disabled = true; sendBtn.textContent = '…';
  try {
    var res = await apiPost('/api/appstudio/chat', { app_slug: _chatAppSlug, messages: _chatMessages });
    var reply = (res && res.content) ? res.content : (res && res.error ? res.error.message : 'Error');
    _chatMessages.push({ role: 'assistant', content: reply });
    appendChatBubble('ai', reply);
  } catch(e) {
    appendChatBubble('ai', 'Error: ' + e.message);
  }
  sendBtn.disabled = false; sendBtn.textContent = 'Send';
  document.getElementById('chatInput').focus();
}

async function submitChatAsRequest() {
  if (!_chatMessages.length) { alert('Start a conversation first.'); return; }
  var slug = document.getElementById('chatAppSel').value;
  if (!slug) { alert('Please select an app.'); return; }
  // Build summary from last AI message, or concatenate user messages
  var lastAi = _chatMessages.filter(function(m) { return m.role === 'assistant'; }).pop();
  var summary = lastAi ? lastAi.content : _chatMessages.map(function(m) { return m.content; }).join(' ');
  // Strip "Summary:" prefix if present
  summary = summary.replace(/^summary:\s*/i, '');
  var btn = document.getElementById('chatSubmitBtn');
  btn.disabled = true; btn.textContent = 'Submitting…';
  try {
    var res = await apiPost('/api/enhancements', { message: summary, app_slug: slug });
    if (res && res.error) { alert('Failed: ' + (res.error.message || JSON.stringify(res.error))); btn.disabled = false; btn.textContent = 'Submit as Request'; return; }
    closeChatPlanner();
    await loadData();
    renderTab();
  } catch(e) {
    alert('Error: ' + e.message); btn.disabled = false; btn.textContent = 'Submit as Request';
  }
}
</script>

<!-- Chat planner modal -->
<div id="chatPlanModal" class="chat-overlay" style="display:none" onclick="if(event.target===this)closeChatPlanner()">
  <div class="chat-modal">
    <div class="chat-header">
      <strong>Plan with AI</strong>
      <div style="display:flex;gap:10px;align-items:center">
        <select id="chatAppSel" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:5px;font-size:.82rem"></select>
        <button onclick="closeChatPlanner()" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:1.1rem;line-height:1">&times;</button>
      </div>
    </div>
    <div id="chatMessages" class="chat-messages"></div>
    <div class="chat-input-row">
      <textarea id="chatInput" class="chat-input" placeholder="Describe what you want…" rows="2" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage()}"></textarea>
      <button id="chatSendBtn" class="btn btn-accent" onclick="sendChatMessage()" style="align-self:flex-end;white-space:nowrap">Send</button>
    </div>
    <div class="chat-footer">
      <span style="font-size:.78rem;color:var(--dim);flex:1">Chat to refine, then submit as a new request.</span>
      <button id="chatSubmitBtn" class="btn btn-accent" onclick="submitChatAsRequest()">Submit as Request</button>
    </div>
  </div>
</div>
