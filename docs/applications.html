<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AppCrane - Applications</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/docs/shared.css">
<style>
.app-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px}
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 16px;gap:12px}
.card-meta{display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0}
.card-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-weight:600;font-size:.95rem}
.card-desc{color:var(--dim);font-size:.78rem;margin-top:3px;max-width:480px;line-height:1.4}
.card-res{font-size:.75rem;color:var(--dim);margin-top:4px}
.card-hdr-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:280px}
.card-envs{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border)}
.card-env{padding:10px 16px}
.card-env.prod{border-right:1px solid var(--border)}
.env-heading{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);margin-bottom:7px}
.env-heading.prod-heading{color:#22c55e88}
.env-heading.sand-heading{color:#f59e0b88}
.env-status-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.env-ver{font-size:.82rem;font-family:monospace}
.env-link{color:var(--dim);text-decoration:none;font-size:.78rem}
.env-link:hover{color:var(--accent)}
.env-act-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.card-footer{padding:8px 14px;border-top:1px solid var(--border);background:var(--bg);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.evars-panel{border-top:1px solid var(--border);background:var(--surface2);padding:12px 16px;font-size:.82rem}
.app-icon-wrap{display:inline-flex;position:relative;width:34px;height:34px;border-radius:7px;cursor:pointer;flex-shrink:0;overflow:hidden;background:var(--surface2);border:1px solid var(--border);transition:border-color .15s;align-items:center;justify-content:center}
.app-icon-wrap:hover{border-color:var(--accent)}
.app-icon-ph{font-size:.78rem;font-weight:700;color:var(--dim)}
.app-icon-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:none}
.vis-badge{font-size:.65rem;padding:1px 6px;border-radius:4px;font-weight:600;white-space:nowrap}
.vis-hidden{background:#6b728022;color:var(--dim)}
.vis-private{background:#3b82f622;color:#3b82f6}
.vis-public{background:#22c55e22;color:#22c55e}
.cat-badge{font-size:.65rem;background:var(--surface2);border:1px solid var(--border);color:var(--dim);border-radius:4px;padding:1px 5px}
.btn-xs{font-size:.72rem;padding:2px 8px}
.btn-red{font-size:.65rem;padding:1px 6px;color:var(--red);background:none;border-color:var(--red);opacity:.8}
.btn-red:hover{opacity:1}
/* Analyze wizard */
.az-overlay{display:none;position:fixed;inset:0;background:#0008;z-index:200;align-items:center;justify-content:center}
.az-overlay.open{display:flex}
.az-modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:min(680px,96vw);max-height:90vh;overflow-y:auto;padding:28px 28px 24px;display:flex;flex-direction:column;gap:18px}
.az-title{font-size:1.05rem;font-weight:700;margin:0}
.az-field{display:flex;flex-direction:column;gap:6px}
.az-label{font-size:.8rem;color:var(--dim);font-weight:600}
.az-input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:7px;font-size:.88rem;font-family:inherit;width:100%;box-sizing:border-box}
.az-input:focus{outline:none;border-color:var(--accent)}
.az-section{font-size:.78rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.az-badge{font-size:.65rem;padding:2px 6px;border-radius:4px;font-weight:600;white-space:nowrap;align-self:center}
.az-req{background:#ef444422;color:#ef4444}
.az-opt{background:#6b728022;color:var(--dim)}
.az-notes{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:10px 12px;font-size:.82rem;color:var(--dim);line-height:1.5}
.az-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:4px}
.az-spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:az-spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes az-spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="appFrame" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:50;background:var(--bg)">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border)">
    <div style="display:flex;align-items:center;gap:12px"><span style="font-weight:700">App<span style="color:var(--accent)">Crane</span></span><span id="frameAppName" style="color:var(--dim);font-size:.9rem"></span></div>
    <div style="display:flex;gap:8px"><a id="frameOpenNew" href="#" target="_blank" style="color:var(--accent);font-size:.85rem;text-decoration:none">Open in new tab</a><button onclick="closeAppFrame()" class="btn">Close</button></div>
  </div>
  <iframe id="frameIframe" style="width:100%;height:calc(100% - 44px);border:none;background:#fff"></iframe>
</div>
<script src="/docs/shared.js"></script>
<script>
if (!checkAuth()) throw 'auth';
document.body.insertAdjacentHTML('beforeend',
  '<div class="page-body">' + sidebar('applications') +
  '<div class="page-content"><div class="container">' +
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">' +
      '<h2 style="margin:0">Applications</h2>' +
      '<div style="display:flex;gap:8px">' +
        '<button class="btn btn-primary" onclick="openAnalyzeWizard()" style="font-size:12px;padding:4px 14px">+ Add from GitHub</button>' +
        '<button class="btn" onclick="generateAgentKey()" style="font-size:12px;padding:4px 14px">+ New App Agent</button>' +
      '</div>' +
    '</div>' +
    '<div id="appsBody"></div>' +
    '<h2 style="margin-top:24px">Unused Keys</h2><div id="unusedKeys"></div>' +
  '</div></div></div>');
loadVersion(); loadUserInfo();

function openAppFrame(url, name) {
  document.getElementById('frameAppName').textContent = name;
  document.getElementById('frameOpenNew').href = url;
  document.getElementById('frameIframe').src = url;
  document.getElementById('appFrame').style.display = 'block';
}
function closeAppFrame() {
  document.getElementById('appFrame').style.display = 'none';
  document.getElementById('frameIframe').src = '';
}

async function fetchLiveVersion(slug, env) {
  try {
    const data = await apiFetch('/api/apps/' + slug + '/live-version/' + env);
    const el = document.getElementById('ver_' + slug + '_' + env);
    if (el && data.version) el.textContent = 'v' + data.version;
  } catch(e) {}
}

// Build a card DOM node for one app (all user data via textContent / safe DOM)
function buildAppCard(a) {
  const sl = a.slug, nm = a.name;
  const prodH = (a.production && a.production.health && a.production.health.status) || 'unknown';
  const sandH = (a.sandbox  && a.sandbox.health  && a.sandbox.health.status)  || 'unknown';
  const prodV = (a.production && a.production.deploy && a.production.deploy.version) || '';
  const sandV = (a.sandbox  && a.sandbox.deploy  && a.sandbox.deploy.version)  || '';
  const prodUrl = window.location.origin + '/' + sl;
  const sandUrl = window.location.origin + '/' + sl + '-sandbox';
  const rl = a.resource_limits || {};
  const ram = rl.max_ram_mb || 512;
  const cpu = rl.max_cpu_percent || 50;
  const ramLabel = ram >= 1024 ? (ram / 1024).toFixed(ram % 1024 === 0 ? 0 : 1) + ' GB' : ram + ' MB';
  const vis = a.visibility || (a.public_access ? 'public' : 'private');

  function el(tag, attrs, text) {
    const e = document.createElement(tag);
    if (attrs) Object.entries(attrs).forEach(function([k,v]) {
      if (k === 'style') e.style.cssText = v;
      else if (k === 'class') e.className = v;
      else e.setAttribute(k, v);
    });
    if (text !== undefined) e.textContent = text;
    return e;
  }
  function btn(label, cls, onclick, title) {
    const b = el('button', { class: 'btn ' + (cls || ''), title: title || '' });
    b.textContent = label;
    b.addEventListener('click', onclick);
    return b;
  }
  function dot(health) {
    const cls = health === 'healthy' ? 'dot-green' : health === 'down' ? 'dot-red' : 'dot-gray';
    return el('span', { class: 'dot ' + cls });
  }

  const card = el('div', { class: 'app-card' });

  // ── Header (app-level) ─────────────────────────────────────
  const hdr = el('div', { class: 'card-hdr' });

  // Icon
  const iconWrap = el('span', { class: 'app-icon-wrap', title: 'Click to upload icon' });
  iconWrap.addEventListener('click', function(e) { uploadIcon(e, sl); });
  const initial = (nm && nm[0]) ? nm[0].toUpperCase() : (sl[0] || '?').toUpperCase();
  iconWrap.appendChild(el('span', { class: 'app-icon-ph' }, initial));
  const img = el('img', { id: 'icon_' + sl, src: '/api/apps/' + sl + '/icon' });
  img.addEventListener('load', function() { img.style.display = 'block'; });
  img.addEventListener('error', function() { img.style.display = 'none'; });
  iconWrap.appendChild(img);

  // Meta (name + desc + resources)
  const meta = el('div', { class: 'card-meta' });
  meta.appendChild(iconWrap);
  const metaText = el('div');

  const nameRow = el('div', { class: 'card-name-row' });
  nameRow.appendChild(el('span', {}, nm));

  // Visibility badge
  const visMap = { hidden: ['vis-hidden','🔒 Hidden'], private: ['vis-private','🔑 Private'], public: ['vis-public','🌐 Public'] };
  const [visCls, visLabel] = visMap[vis] || visMap.private;
  nameRow.appendChild(el('span', { class: 'vis-badge ' + visCls }, visLabel));
  if (a.category) nameRow.appendChild(el('span', { class: 'cat-badge' }, a.category));
  metaText.appendChild(nameRow);

  if (a.description) {
    const desc = el('div', { class: 'card-desc' });
    desc.textContent = a.description;
    metaText.appendChild(desc);
  }
  const resRow = el('div', { class: 'card-res' });
  const ramDim = el('span', { style: 'color:var(--dim)' }, 'RAM ');
  const cpuDim = el('span', { style: 'color:var(--dim);margin-left:12px' }, 'CPU ');
  resRow.appendChild(ramDim);
  resRow.appendChild(document.createTextNode(ramLabel));
  resRow.appendChild(cpuDim);
  resRow.appendChild(document.createTextNode(cpu + '%'));
  metaText.appendChild(resRow);
  meta.appendChild(metaText);
  hdr.appendChild(meta);

  // Header actions
  const actions = el('div', { class: 'card-hdr-actions' });

  // Visibility select
  const visSel = el('select', { title: 'Visibility', style: 'font-size:.72rem;padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer' });
  [['hidden','🔒 Hidden'],['private','🔑 Private'],['public','🌐 Public']].forEach(function([v,label]) {
    const opt = el('option', { value: v }, label);
    if (v === vis) opt.selected = true;
    visSel.appendChild(opt);
  });
  visSel.addEventListener('change', function() { setVisibility(sl, visSel.value); });
  actions.appendChild(visSel);

  const manageLink = el('a', { href: '/app?slug=' + sl, class: 'btn btn-xs' }, 'manage');
  actions.appendChild(manageLink);
  actions.appendChild(btn('onboard', 'btn-xs', function() { showAppToken(sl); }));
  if (isAdmin()) {
    actions.appendChild(btn('tag', 'btn-xs', function() { setCategory(sl, a.category || ''); }, 'Set category'));
    actions.appendChild(btn('⚙ limits', 'btn-xs', function() { editResources(sl, ram, cpu); }, 'Edit resource limits'));
  }
  actions.appendChild(btn('delete', 'btn-xs btn-red', function() { deleteApp(sl, nm); }));
  hdr.appendChild(actions);
  card.appendChild(hdr);

  // ── Env columns (per-env) ──────────────────────────────────
  const envs = el('div', { class: 'card-envs' });

  function buildEnvCol(env, health, version, url, isProd) {
    const col = el('div', { class: 'card-env' + (isProd ? ' prod' : ' sand') });
    col.appendChild(el('div', { class: 'env-heading ' + (isProd ? 'prod-heading' : 'sand-heading') }, isProd ? 'Production' : 'Sandbox'));

    const statusRow = el('div', { class: 'env-status-row' });
    statusRow.appendChild(dot(health));
    const verSpan = el('span', { class: 'env-ver', id: 'ver_' + sl + '_' + env }, version ? 'v' + version : '—');
    statusRow.appendChild(verSpan);
    if (url) {
      const link = el('a', { href: '#', class: 'env-link' }, '↗ open');
      link.addEventListener('click', function(e) { e.preventDefault(); openAppFrame(url, nm); });
      statusRow.appendChild(link);
    }
    col.appendChild(statusRow);

    const actRow = el('div', { class: 'env-act-row' });
    actRow.appendChild(btn('env vars', 'btn-xs', function() { toggleEnvVars(sl, env); }));
    actRow.appendChild(btn('↺ restart', 'btn-xs', function(e) { restartApp(sl, env, e.target); }));
    col.appendChild(actRow);
    return col;
  }

  envs.appendChild(buildEnvCol('production', prodH, prodV, prodUrl, true));
  envs.appendChild(buildEnvCol('sandbox',    sandH, sandV, sandUrl, false));
  card.appendChild(envs);

  // ── Env vars panel (expandable) ────────────────────────────
  const evarsPanel = el('div', { id: 'evars_' + sl, class: 'evars-panel', style: 'display:none' });
  const evarsInner = el('div', { id: 'evarsInner_' + sl });
  evarsPanel.appendChild(evarsInner);
  card.appendChild(evarsPanel);

  // ── Footer (GitHub / source actions) ──────────────────────
  if (a.source_type === 'github' || a.github_url) {
    const footer = el('div', { class: 'card-footer' });
    if (a.github_url) {
      const ghLink = el('a', { href: a.github_url, target: '_blank', style: 'color:var(--dim);font-size:.75rem;text-decoration:none' }, '⎊ GitHub');
      footer.appendChild(ghLink);
    }
    if (a.source_type === 'github') {
      const updBtn = el('button', { class: 'btn btn-xs', id: 'updbtn_' + sl }, '↑ check updates');
      updBtn.addEventListener('click', function() { checkUpdates(sl); });
      footer.appendChild(updBtn);
      const hookBtn = el('button', { class: 'btn btn-xs', id: 'hookbtn_' + sl }, 'gh hook');
      hookBtn.addEventListener('click', function() { registerGithubHook(sl); });
      footer.appendChild(hookBtn);
    }
    card.appendChild(footer);
  }

  return card;
}

async function setVisibility(slug, visibility) {
  const data = await apiPut('/api/apps/' + slug, { visibility });
  if (data.error) { alert('Failed: ' + data.error.message); loadApps(); }
}

async function showAppToken(slug) {
  const apiUrl = window.location.origin, guideUrl = apiUrl + '/agent-guide';
  const data = await apiPost('/api/apps/' + slug + '/deployment-key');
  if (data.error) { alert('Could not create deployment key: ' + data.error.message); return; }
  showPromptModal('Deployment Key: ' + slug,
    'You are an AI agent managing deployments on AppCrane.\n\nAPI Base URL: ' + apiUrl + '\nAPI Key: ' + data.api_key + '\nAgent Guide: ' + guideUrl + '\nApp Slug: ' + slug + '\n\nThis key is scoped to the "' + slug + '" app only.\n\nTo deploy:\ncurl -X POST ' + apiUrl + '/api/apps/' + slug + '/deploy/sandbox -H "X-API-Key: $KEY"\n\nTo promote to production:\ncurl -X POST ' + apiUrl + '/api/apps/' + slug + '/promote -H "X-API-Key: $KEY"');
  loadApps();
}

async function generateAgentKey() {
  const name = 'agent-' + Date.now().toString(36);
  const data = await apiPost('/api/users', { name, email: name + '@appcrane', role: 'user' });
  if (data.error) { alert(data.error.message); return; }
  const guideUrl = window.location.origin + '/agent-guide', apiUrl = window.location.origin;
  showPromptModal('New Agent: ' + name, 'You are an AI agent managing deployments on AppCrane.\n\nAPI Base URL: ' + apiUrl + '\nAPI Key: ' + data.api_key + '\nAgent Guide: ' + guideUrl + '\n\nRead the agent guide first. You can create apps, deploy, manage env vars, configure health checks, and rollback.\nYou do NOT need admin help. Create an app with POST /api/apps and start deploying.');
  loadApps();
}

async function restartApp(slug, env, btnEl) {
  const orig = btnEl.textContent;
  btnEl.disabled = true; btnEl.textContent = '...';
  const data = await apiPost('/api/apps/' + slug + '/restart/' + env);
  btnEl.disabled = false; btnEl.textContent = orig;
  if (data.error) alert('Restart failed: ' + data.error.message);
}

async function deleteApp(slug, name) {
  if (!confirm('Delete "' + name + '"?')) return;
  if (!confirm('Are you SURE? Cannot be undone.')) return;
  await apiDelete('/api/apps/' + slug + '?confirm=true');
  loadApps();
}

async function checkUpdates(slug) {
  const btn = document.getElementById('updbtn_' + slug);
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = '...';
  const data = await apiFetch('/api/apps/' + slug + '/updates');
  btn.disabled = false;
  if (data.error) { btn.textContent = orig; alert('Error: ' + data.error.message); return; }
  if (data.not_applicable) {
    btn.textContent = '⚠ no GitHub URL'; btn.style.color = 'var(--dim)';
  } else if (!data.available) {
    btn.textContent = '✓ up to date'; btn.style.color = 'var(--green)';
  } else {
    var label = data.latest_message || data.latest_sha;
    if (label.length > 30) label = label.slice(0, 30) + '…';
    btn.textContent = '↑ ' + label; btn.style.color = 'var(--yellow)';
    btn.title = data.latest_message + ' (' + data.latest_sha + ')';
  }
  setTimeout(function() { btn.textContent = orig; btn.style.color = ''; btn.title = ''; }, 5000);
}

async function registerGithubHook(slug) {
  const btn = document.getElementById('hookbtn_' + slug);
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = '...';
  const data = await apiPost('/api/apps/' + slug + '/webhook/register-github');
  btn.disabled = false; btn.textContent = orig;
  if (data.error) { alert('Failed: ' + data.error.message); return; }
  alert('✓ ' + data.message + '\n' + data.webhook_url);
}

let _openEvars = null;
async function toggleEnvVars(slug, env) {
  const panel = document.getElementById('evars_' + slug);
  const inner = document.getElementById('evarsInner_' + slug);
  if (_openEvars && _openEvars.slug === slug && _openEvars.env === env) {
    panel.style.display = 'none'; _openEvars = null; return;
  }
  if (_openEvars) document.getElementById('evars_' + _openEvars.slug).style.display = 'none';
  _openEvars = { slug, env };
  panel.style.display = '';
  inner.textContent = 'Loading…';
  await renderEnvVars(slug, env, inner);
}

async function renderEnvVars(slug, env, inner) {
  try {
    const data = await apiFetch('/api/apps/' + slug + '/env/' + env + '?reveal=true');
    if (data.error) { inner.textContent = data.error.message; return; }
    inner.textContent = '';
    const iStyle = 'background:var(--bg);border:1px solid var(--border);color:var(--text);padding:3px 7px;border-radius:4px;font-size:.8rem;font-family:monospace';
    const hdrDiv = document.createElement('div');
    hdrDiv.style.cssText = 'font-size:.78rem;color:var(--dim);margin-bottom:8px;font-weight:600';
    hdrDiv.textContent = (env === 'production' ? 'Production' : 'Sandbox') + ' — ' + (data.vars ? data.vars.length : 0) + ' vars';
    inner.appendChild(hdrDiv);
    if (data.vars && data.vars.length) {
      const tbl = document.createElement('table');
      tbl.style.marginBottom = '8px';
      const hdr = tbl.insertRow();
      ['KEY','VALUE',''].forEach(function(h) {
        const th = document.createElement('th');
        th.style.cssText = 'text-align:left;color:var(--dim);font-size:.72rem;padding:2px 8px 4px 0;font-weight:600';
        th.textContent = h; hdr.appendChild(th);
      });
      data.vars.forEach(function(v) {
        const tr = tbl.insertRow();
        const tdKey = tr.insertCell();
        tdKey.style.cssText = 'font-family:monospace;font-size:.8rem;padding:3px 10px 3px 0;white-space:nowrap';
        tdKey.textContent = v.key;
        const tdVal = tr.insertCell();
        const inp = document.createElement('input');
        inp.value = v.value; inp.style.cssText = iStyle + ';width:100%';
        inp.dataset.slug = slug; inp.dataset.env = env; inp.dataset.key = v.key;
        inp.addEventListener('change', function() { updateEnvVar(this.dataset.slug, this.dataset.env, this.dataset.key, this.value); });
        tdVal.appendChild(inp);
        const tdDel = tr.insertCell();
        const delBtn = document.createElement('button');
        delBtn.style.cssText = 'background:none;border:none;color:var(--dim);cursor:pointer;font-size:.85rem;padding:0 4px';
        delBtn.textContent = '×';
        delBtn.dataset.slug = slug; delBtn.dataset.env = env; delBtn.dataset.key = v.key;
        delBtn.addEventListener('click', function() { deleteEnvVar(this.dataset.slug, this.dataset.env, this.dataset.key); });
        tdDel.appendChild(delBtn);
      });
      inner.appendChild(tbl);
    }
    const addRow = document.createElement('div');
    addRow.style.cssText = 'display:flex;gap:4px';
    const ekInp = document.createElement('input');
    ekInp.id = 'ek_' + slug + '_' + env; ekInp.placeholder = 'NEW_KEY'; ekInp.style.cssText = iStyle + ';width:130px';
    const evInp = document.createElement('input');
    evInp.id = 'ev_' + slug + '_' + env; evInp.placeholder = 'value'; evInp.style.cssText = iStyle + ';flex:1';
    const addBtn = document.createElement('button');
    addBtn.className = 'btn'; addBtn.style.cssText = 'font-size:.78rem;padding:3px 12px'; addBtn.textContent = 'Add';
    addBtn.dataset.slug = slug; addBtn.dataset.env = env;
    addBtn.addEventListener('click', function() { addEnvVar(this.dataset.slug, this.dataset.env); });
    addRow.appendChild(ekInp); addRow.appendChild(evInp); addRow.appendChild(addBtn);
    inner.appendChild(addRow);
    if (data.warnings) {
      data.warnings.forEach(function(w) {
        const wDiv = document.createElement('div');
        wDiv.style.cssText = 'color:var(--yellow);font-size:.78rem;margin-top:4px';
        wDiv.textContent = w; inner.appendChild(wDiv);
      });
    }
  } catch(e) { inner.textContent = e.message; }
}

async function updateEnvVar(s, e, k, v) { await apiPut('/api/apps/' + s + '/env/' + e, { vars: { [k]: v } }); }
async function addEnvVar(s, e) {
  const k = document.getElementById('ek_' + s + '_' + e).value.trim();
  const v = document.getElementById('ev_' + s + '_' + e).value;
  if (!k) return;
  await apiPut('/api/apps/' + s + '/env/' + e, { vars: { [k]: v } });
  const inner = document.getElementById('evarsInner_' + s);
  if (inner) await renderEnvVars(s, e, inner);
}
async function deleteEnvVar(s, e, k) {
  if (!confirm('Delete ' + k + '?')) return;
  await apiDelete('/api/apps/' + s + '/env/' + e + '/' + k);
  const inner = document.getElementById('evarsInner_' + s);
  if (inner) await renderEnvVars(s, e, inner);
}

async function uploadIcon(event, slug) {
  event.stopPropagation();
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.png,.jpg,.jpeg,.webp,.gif,image/png,image/jpeg,image/webp,image/gif';
  input.onchange = async function() {
    const file = input.files[0];
    if (!file) return;
    const formData = new FormData();
    formData.append('icon', file);
    try {
      const res = await fetch('/api/apps/' + slug + '/icon', { method: 'POST', headers: { 'X-API-Key': KEY }, body: formData });
      if (!res.ok) { const d = await res.json(); alert('Upload failed: ' + (d.error && d.error.message || 'Unknown error')); return; }
      const img = document.getElementById('icon_' + slug);
      if (img) { img.addEventListener('load', function() { img.style.display = 'block'; }, { once: true }); img.src = '/api/apps/' + slug + '/icon?t=' + Date.now(); }
    } catch(e) { alert('Upload failed: ' + e.message); }
  };
  input.click();
}

async function loadApps() {
  const apps = await apiFetch('/api/apps');
  const body = document.getElementById('appsBody');
  body.textContent = '';
  if (!apps.apps || !apps.apps.length) {
    const empty = document.createElement('div');
    empty.style.cssText = 'color:var(--dim);padding:24px 0';
    empty.textContent = 'No apps yet.';
    body.appendChild(empty);
    return;
  }
  apps.apps.forEach(function(a) {
    try {
      body.appendChild(buildAppCard(a));
    } catch (e) {
      console.error('buildAppCard failed for', a && a.slug, e);
      const errDiv = document.createElement('div');
      errDiv.className = 'app-card';
      errDiv.style.cssText = 'padding:12px 16px;color:var(--red)';
      errDiv.textContent = (a && a.slug || '?') + ': render error — ' + e.message;
      body.appendChild(errDiv);
    }
  });
  apps.apps.forEach(function(a) {
    fetchLiveVersion(a.slug, 'production');
    fetchLiveVersion(a.slug, 'sandbox');
  });

  const users = await apiFetch('/api/users');
  const unused = (users.users || []).filter(function(u) { return !u.assigned_apps && u.role !== 'admin'; });
  const unusedEl = document.getElementById('unusedKeys');
  unusedEl.textContent = '';
  if (unused.length) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden';
    const tbl = document.createElement('table');
    tbl.style.cssText = 'width:100%;border-collapse:collapse';
    const thead = document.createElement('thead');
    const hdr = document.createElement('tr');
    ['ID','Name','Email','Created',''].forEach(function(h) {
      const th = document.createElement('th');
      th.style.cssText = 'text-align:left;padding:8px 12px;font-size:.75rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);font-weight:600';
      th.textContent = h; hdr.appendChild(th);
    });
    thead.appendChild(hdr); tbl.appendChild(thead);
    const utbody = document.createElement('tbody');
    unused.forEach(function(u) {
      const tr = document.createElement('tr');
      const tdId = tr.insertCell(); tdId.style.cssText = 'padding:8px 12px;font-size:.88rem;color:var(--dim)'; tdId.textContent = u.id;
      ['name','email','created_at'].forEach(function(f) {
        const td = tr.insertCell(); td.style.cssText = 'padding:8px 12px;font-size:.88rem'; td.textContent = u[f] || '—';
      });
      const tdAct = tr.insertCell(); tdAct.style.cssText = 'padding:8px 12px';
      const delBtn = document.createElement('button');
      delBtn.className = 'btn btn-red'; delBtn.style.cssText = 'font-size:.72rem;padding:2px 10px'; delBtn.textContent = 'Delete';
      delBtn.dataset.id = u.id; delBtn.dataset.name = u.name;
      delBtn.addEventListener('click', function() { delUser(parseInt(this.dataset.id), this.dataset.name); });
      tdAct.appendChild(delBtn); utbody.appendChild(tr);
    });
    tbl.appendChild(utbody); wrap.appendChild(tbl); unusedEl.appendChild(wrap);
  } else {
    const div = document.createElement('div'); div.style.color = 'var(--dim)'; div.textContent = 'None';
    unusedEl.appendChild(div);
  }
}

async function delUser(id, name) {
  if (!confirm('Delete "' + name + '"?')) return;
  await apiDelete('/api/users/' + id);
  loadApps();
}

async function editResources(slug, currentRam, currentCpu) {
  if (!isAdmin()) { alert('Admin only'); return; }
  const ramStr = prompt('Max RAM (MB, 64-16384):', String(currentRam));
  if (ramStr === null) return;
  const cpuStr = prompt('Max CPU (%, 5-800; 100 = 1 full core):', String(currentCpu));
  if (cpuStr === null) return;
  const ram = parseInt(ramStr, 10), cpu = parseInt(cpuStr, 10);
  if (!ram || ram < 64 || ram > 16384) { alert('RAM must be 64-16384 MB'); return; }
  if (!cpu || cpu < 5 || cpu > 800) { alert('CPU must be 5-800 percent'); return; }
  const data = await apiPut('/api/apps/' + slug, { max_ram_mb: ram, max_cpu_percent: cpu });
  if (data.error) { alert('Failed: ' + data.error.message); return; }
  alert('Resource limits updated. Takes effect on next deploy.');
  loadApps();
}

async function setCategory(slug, current) {
  const val = prompt('Category for "' + slug + '" (leave blank to clear):', current);
  if (val === null) return;
  const data = await apiPut('/api/apps/' + slug, { category: val.trim() || null });
  if (data.error) { alert('Failed: ' + data.error.message); return; }
  loadApps();
}

loadApps();
</script>

<!-- Analyze-from-GitHub wizard -->
<div id="azOverlay" class="az-overlay" onclick="if(event.target===this)closeAnalyzeWizard()">
<div class="az-modal" id="azModal">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <h3 class="az-title" id="azTitle">Add App from GitHub</h3>
    <button onclick="closeAnalyzeWizard()" class="btn" style="padding:3px 10px">✕</button>
  </div>
  <div id="azStep1">
    <div class="az-field">
      <label class="az-label">GitHub Repository URL</label>
      <input id="azUrl" class="az-input" placeholder="https://github.com/org/repo" />
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="az-field">
        <label class="az-label">Branch</label>
        <input id="azBranch" class="az-input" placeholder="main" />
      </div>
    </div>
    <div class="az-field">
      <label class="az-label">Personal Access Token <span style="color:var(--dim);font-weight:400">(optional, for private repos)</span></label>
      <input id="azToken" class="az-input" type="password" placeholder="ghp_..." />
    </div>
    <div class="az-actions">
      <button class="btn" onclick="closeAnalyzeWizard()">Cancel</button>
      <button class="btn btn-primary" onclick="runAnalyze()">Analyze with AI →</button>
    </div>
  </div>
  <div id="azStep2" style="display:none;text-align:center;padding:32px 0;color:var(--dim)">
    <span class="az-spinner"></span>Cloning and analyzing repository…
  </div>
  <div id="azStep3" style="display:none">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <span id="azFramework" style="font-size:.78rem;background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:5px;color:var(--dim)"></span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="az-field"><label class="az-label">App Name</label><input id="azName" class="az-input" /></div>
      <div class="az-field"><label class="az-label">Slug</label><input id="azSlug" class="az-input" /></div>
    </div>
    <div class="az-field"><label class="az-label">Description</label><input id="azDesc" class="az-input" /></div>
    <div id="azEnvSection" style="display:none">
      <div class="az-section" style="margin:14px 0 4px">Environment Variables</div>
      <p style="font-size:.78rem;color:var(--dim);margin:0 0 12px">Fill values now or leave blank to set later.</p>
      <div id="azEnvRows"></div>
    </div>
    <div id="azNotesSection" style="display:none">
      <div class="az-section" style="margin:14px 0 8px">Setup Notes</div>
      <div id="azNotes" class="az-notes"></div>
    </div>
    <div class="az-actions" style="margin-top:16px">
      <button class="btn" onclick="closeAnalyzeWizard()">Cancel</button>
      <button class="btn btn-primary" id="azCreateBtn" onclick="createFromAnalysis()">Create App</button>
    </div>
  </div>
</div>
</div>

<script>
var _analysis = null;

function openAnalyzeWizard() {
  _analysis = null;
  ['azStep2','azStep3'].forEach(function(id){ document.getElementById(id).style.display='none'; });
  document.getElementById('azStep1').style.display = '';
  document.getElementById('azTitle').textContent = 'Add App from GitHub';
  document.getElementById('azUrl').value = '';
  document.getElementById('azBranch').value = '';
  document.getElementById('azToken').value = '';
  document.getElementById('azOverlay').classList.add('open');
}
function closeAnalyzeWizard() { document.getElementById('azOverlay').classList.remove('open'); }

async function runAnalyze() {
  const url = document.getElementById('azUrl').value.trim();
  const branch = document.getElementById('azBranch').value.trim() || 'main';
  const token = document.getElementById('azToken').value.trim();
  if (!url) { alert('Please enter a GitHub URL'); return; }
  document.getElementById('azStep1').style.display = 'none';
  document.getElementById('azStep2').style.display = '';
  document.getElementById('azTitle').textContent = 'Analyzing repository…';
  try {
    const body = { github_url: url, branch };
    if (token) body.github_token = token;
    const data = await apiPost('/api/apps/analyze', body);
    if (data.error) throw new Error(data.error.message);
    _analysis = data.analysis;
    renderAnalysis(_analysis);
  } catch (e) {
    document.getElementById('azStep2').style.display = 'none';
    document.getElementById('azStep1').style.display = '';
    document.getElementById('azTitle').textContent = 'Add App from GitHub';
    alert('Analysis failed: ' + e.message);
  }
}

function renderAnalysis(a) {
  document.getElementById('azStep2').style.display = 'none';
  document.getElementById('azStep3').style.display = '';
  document.getElementById('azTitle').textContent = 'Review & Create';
  document.getElementById('azFramework').textContent = [a.framework, a.language].filter(Boolean).join(' · ');
  document.getElementById('azName').value = a.name || '';
  document.getElementById('azSlug').value = a.slug || '';
  document.getElementById('azDesc').value = a.description || '';
  const rows = document.getElementById('azEnvRows');
  rows.textContent = '';
  if (a.env_vars && a.env_vars.length) {
    document.getElementById('azEnvSection').style.display = '';
    a.env_vars.forEach(function(v) {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'display:grid;grid-template-columns:180px 1fr;gap:8px;margin-bottom:10px;align-items:start';
      const left = document.createElement('div');
      const key = document.createElement('div');
      key.style.cssText = 'font-family:monospace;font-size:.78rem;font-weight:700;color:var(--text);padding:6px 0 3px';
      key.textContent = v.key;
      const badge = document.createElement('span');
      badge.className = 'az-badge ' + (v.required ? 'az-req' : 'az-opt');
      badge.textContent = v.required ? 'required' : 'optional';
      left.appendChild(key); left.appendChild(badge);
      const right = document.createElement('div');
      const inp = document.createElement('input');
      inp.className = 'az-input'; inp.dataset.envKey = v.key;
      inp.placeholder = v.example || v.description || ''; inp.style.fontSize = '.82rem';
      const desc = document.createElement('div');
      desc.style.cssText = 'font-size:.72rem;color:var(--dim);margin-top:4px;line-height:1.4';
      desc.textContent = v.description || '';
      right.appendChild(inp); right.appendChild(desc);
      wrap.appendChild(left); wrap.appendChild(right); rows.appendChild(wrap);
    });
  } else { document.getElementById('azEnvSection').style.display = 'none'; }
  if (a.notes && a.notes.trim()) {
    document.getElementById('azNotesSection').style.display = '';
    document.getElementById('azNotes').textContent = a.notes;
  } else { document.getElementById('azNotesSection').style.display = 'none'; }
}

async function createFromAnalysis() {
  const name = document.getElementById('azName').value.trim();
  const slug = document.getElementById('azSlug').value.trim();
  if (!name || !slug) { alert('Name and slug are required'); return; }
  if (!/^[a-z0-9][a-z0-9-]*$/.test(slug)) { alert('Slug must be lowercase letters, numbers, and dashes'); return; }
  const btn = document.getElementById('azCreateBtn');
  btn.disabled = true; btn.textContent = 'Creating…';
  try {
    const app = await apiPost('/api/apps', {
      name, slug,
      description: document.getElementById('azDesc').value.trim() || null,
      github_url: _analysis.github_url,
      branch: _analysis.branch || 'main',
      source_type: 'github',
    });
    if (app.error) throw new Error(app.error.message);
    const vars = {};
    document.querySelectorAll('#azEnvRows input[data-env-key]').forEach(function(inp) {
      if (inp.value.trim()) vars[inp.dataset.envKey] = inp.value.trim();
    });
    if (Object.keys(vars).length) {
      await apiPut('/api/apps/' + slug + '/env/production', { vars });
      await apiPut('/api/apps/' + slug + '/env/sandbox', { vars });
    }
    closeAnalyzeWizard(); loadApps();
  } catch (e) {
    alert('Failed: ' + e.message);
    btn.disabled = false; btn.textContent = 'Create App';
  }
}
</script>
</body>
</html>
